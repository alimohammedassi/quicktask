<div class="w-16 h-16 bg-secondary flex items-center justify-center rounded-full voice-pulse mb-stack-md">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<h1 class="font-h2 text-h2 text-primary mb-2">Parsed Successfully</h1>
<p class="font-body-md text-on-surface-variant">Review your task details before syncing.</p>
</section>
<!-- Task Data Card -->
<section class="bg-white rounded-[24px] shadow-[0_4px_20px_-4px_rgba(30,27,75,0.08)] border border-gray-100 p-6 flex flex-col gap-stack-md">
<!-- Title Input -->
<div class="group cursor-pointer p-4 rounded-xl hover:bg-surface-container-low transition-colors border border-transparent hover:border-gray-100">
<label class="font-label-xs text-secondary mb-1 block">Title</label>
<div class="flex items-center justify-between">
<span class="font-h3 text-h3 text-primary">Lunch with Sarah</span>
<span class="material-symbols-outlined text-gray-400 group-hover:text-secondary">edit</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">

<div class="flex items-center justify-between">
<span class="font-body-lg text-body-lg font-semibold text-primary">Tomorrow</span>
<span class="material-symbols-outlined text-gray-400 group-hover:text-secondary text-sm">event</span>
</div>
</div>

<div class="group cursor-pointer p-4 rounded-xl hover:bg-surface-container-low transition-colors border border-transparent hover:border-gray-100">
<label class="font-label-xs text-secondary mb-1 block">Time</label>
<div class="flex items-center justify-between">
<span class="font-body-lg text-body-lg font-semibold text-primary">1:00 PM</span>
<span class="material-symbols-outlined text-gray-400 group-hover:text-secondary text-sm">schedule</span>
</div>
</div>
</div>

</div>
</div>
